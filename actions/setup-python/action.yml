name: Setup Python
description: Set up Python with pip caching keyed to a requirements file
inputs:
  python-version:
    description: Python version to install
    required: false
    default: '3.12'
  requirements-path:
    description: Path to the requirements file used as the pip cache key
    required: false
    default: requirements.txt
runs:
  using: composite
  steps:
    - name: Set up Python ${{ inputs.python-version }}
      uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
      with:
        python-version: ${{ inputs.python-version }}
        cache: pip
        cache-dependency-path: ${{ inputs.requirements-path }}
