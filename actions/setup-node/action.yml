name: Setup Node
description: Set up Node.js with npm caching keyed to a lockfile
inputs:
  node-version:
    description: Node.js version to install
    required: false
    default: '20.x'
  lockfile-path:
    description: Path to the package-lock.json used as the npm cache key
    required: false
    default: package-lock.json
runs:
  using: composite
  steps:
    - name: Use Node.js ${{ inputs.node-version }}
      uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
      with:
        node-version: ${{ inputs.node-version }}
        cache: npm
        cache-dependency-path: ${{ inputs.lockfile-path }}
