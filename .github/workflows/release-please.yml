name: Release Please

on:
  workflow_call:
    inputs:
      config-file:
        description: Path to the release-please config file
        required: false
        type: string
        default: .github/release-please/config.json
      manifest-file:
        description: Path to the release-please manifest file
        required: false
        type: string
        default: .github/release-please/manifest.json
    outputs:
      release_created:
        description: Whether a release was created by this run
        value: ${{ jobs.release.outputs.release_created }}
      version:
        description: The version of the created release
        value: ${{ jobs.release.outputs.version }}

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      version: ${{ steps.release.outputs.version }}
    steps:
      - uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7 # v5.0.0
        id: release
        with:
          config-file: ${{ inputs.config-file }}
          manifest-file: ${{ inputs.manifest-file }}
