name: Docker Build & Push

on:
  workflow_call:
    inputs:
      context:
        description: Docker build context
        required: false
        type: string
        default: .
      image-name:
        description: Image name without registry/owner (e.g. chores-web-backend)
        required: true
        type: string
      push:
        description: Push the image to GHCR (false = build only)
        required: false
        type: boolean
        default: false
      version:
        description: Version tag to publish alongside latest (empty = latest only)
        required: false
        type: string
        default: ''

jobs:
  docker:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - name: Log in to GHCR
        if: inputs.push
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0
      - name: Compute tags
        id: tags
        env:
          IMAGE: ghcr.io/${{ github.repository_owner }}/${{ inputs.image-name }}
          VERSION: ${{ inputs.version }}
        run: |
          TAGS="$IMAGE:latest"
          if [ -n "$VERSION" ]; then
            TAGS="$TAGS,$IMAGE:$VERSION"
          fi
          echo "tags=$TAGS" >> "$GITHUB_OUTPUT"
      - name: Build${{ inputs.push && ' and push' || '' }} image
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: ${{ inputs.context }}
          push: ${{ inputs.push }}
          tags: ${{ steps.tags.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
