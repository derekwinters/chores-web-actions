name: Docker Build & Push

on:
  workflow_call:
    inputs:
      context:
        description: Docker build context
        required: false
        type: string
        default: .
      image-name:
        description: Image name without registry/owner (e.g. chores-web-backend)
        required: true
        type: string
      push:
        description: Push the image to GHCR (false = build only)
        required: false
        type: boolean
        default: false
      version:
        description: Version tag to publish alongside latest (empty = latest only)
        required: false
        type: string
        default: ''

jobs:
  docker:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Log in to GHCR
        if: inputs.push
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0
      - name: Compute tags
        id: tags
        env:
          IMAGE: ghcr.io/${{ github.repository_owner }}/${{ inputs.image-name }}
          VERSION: ${{ inputs.version }}
        run: |
          TAGS="$IMAGE:latest"
          if [ -n "$VERSION" ]; then
            TAGS="$TAGS,$IMAGE:$VERSION"
          fi
          echo "tags=$TAGS" >> "$GITHUB_OUTPUT"
      - name: Build${{ inputs.push && ' and push' || '' }} image
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: ${{ inputs.context }}
          push: ${{ inputs.push }}
          tags: ${{ steps.tags.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
